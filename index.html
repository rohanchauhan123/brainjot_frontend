<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BrainJot</title>
    <meta name="description" content="Your brain at a glance — project &amp; task management" />
    <meta name="theme-color" content="#000000" />

    <!-- Inter font: parallel preconnect + stylesheet (non-blocking, replaces CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />

    <!-- PWA Icons -->
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- iOS PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BrainJot" />

    <!-- Open Graph (for link sharing) -->
    <meta property="og:title" content="BrainJot" />
    <meta property="og:description" content="Your brain at a glance" />
    <meta property="og:type" content="website" />
    
    <!-- Google Identity Services for Google Login -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- Inline theme detection: runs before first paint to eliminate dark-flash for light-mode users -->
    <script>(function(){var t=localStorage.getItem('theme');if(t==='light'||(t===null&&window.matchMedia('(prefers-color-scheme:light)').matches))document.body.classList.add('theme-light')})()</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
